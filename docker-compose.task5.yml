name: huggingface-cpg-task5

services:
  kafka:
    image: apache/kafka:4.3.1
    ports:
      - "${KAFKA_EXTERNAL_PORT:-29092}:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENERS: CONTROLLER://:9093,INTERNAL://:9092,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 20s
      retries: 20
      start_period: 15s

  kafka-init:
    image: apache/kafka:4.3.1
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/bash
      - -ec
      - >
        /opt/kafka/bin/kafka-topics.sh
        --bootstrap-server kafka:9092
        --create
        --if-not-exists
        --topic cpg.metadata
        --partitions 1
        --replication-factor 1
        --config cleanup.policy=compact
    restart: "no"

  mongodb:
    image: mongo:8.0
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --eval \"quit(db.adminCommand('ping').ok ? 0 : 2)\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  metadata-stream:
    image: spark:4.1.2-scala2.13-java17-python3-ubuntu
    user: "0:0"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_METADATA_TOPIC: cpg.metadata
      KAFKA_STARTING_OFFSETS: earliest
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: cpg
      MONGODB_COLLECTION: source_metadata
      CHECKPOINT_LOCATION: /opt/spark-checkpoints/cpg-metadata
      STREAM_TRIGGER: 5 seconds
    command:
      - /opt/spark/bin/spark-submit
      - --master
      - local[2]
      - --conf
      - spark.jars.ivy=/tmp/.ivy2
      - --packages
      - org.apache.spark:spark-sql-kafka-0-10_2.13:4.1.2,org.mongodb.spark:mongo-spark-connector_2.13:11.1.0
      - /opt/app/task5/metadata_stream.py
    ports:
      - "${SPARK_UI_PORT:-4040}:4040"
    volumes:
      - ./task5:/opt/app/task5:ro
      - spark-checkpoints:/opt/spark-checkpoints
      - spark-ivy-cache:/tmp/.ivy2
    restart: unless-stopped

volumes:
  mongodb-data:
  spark-checkpoints:
  spark-ivy-cache:
