services:
  kafka:
    image: apache/kafka:4.3.1
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: >-
        CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: >-
        PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:19092
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_LISTENERS: >-
        CONTROLLER://:29093,PLAINTEXT_HOST://:9092,PLAINTEXT://:19092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list
          >/dev/null 2>&1
      interval: 10s
      timeout: 20s
      retries: 12
      start_period: 20s
    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: unless-stopped

  kafka-init:
    image: apache/kafka:4.3.1
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/bash
      - -ec
      - |
        topics_bin=/opt/kafka/bin/kafka-topics.sh
        for topic in cpg.nodes cpg.edges cpg.metadata; do
          "$$topics_bin" --bootstrap-server kafka:19092 --create \
            --if-not-exists --topic "$$topic" --partitions 1 \
            --replication-factor 1 --config cleanup.policy=compact
        done
        "$$topics_bin" --bootstrap-server kafka:19092 --create \
          --if-not-exists --topic cpg.errors --partitions 1 \
          --replication-factor 1 --config cleanup.policy=delete \
          --config retention.ms=604800000
    restart: "no"

volumes:
  kafka-data:
