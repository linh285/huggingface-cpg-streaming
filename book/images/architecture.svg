<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="760" viewBox="0 0 1500 760" role="img" aria-labelledby="title desc">
  <title id="title">Big Data Lab 04 streaming architecture</title>
  <desc id="desc">Parser emits four Kafka topics. Node and edge topics go through Neo4j Kafka Connector to Neo4j. Metadata goes through Spark Structured Streaming to MongoDB. Parser errors go only to the errors topic.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#334155"/>
    </marker>
    <style>
      .box{rx:18;stroke-width:3}.label{font:700 24px system-ui,sans-serif;fill:#0f172a}.small{font:500 18px system-ui,sans-serif;fill:#334155}.arrow{stroke:#334155;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1500" height="760" fill="#f8fafc"/>
  <text x="750" y="58" text-anchor="middle" class="label" font-size="32">Incremental CPG Streaming Pipeline</text>

  <rect class="box" x="50" y="300" width="250" height="130" fill="#dbeafe" stroke="#2563eb"/>
  <text x="175" y="350" text-anchor="middle" class="label">Parser Service</text>
  <text x="175" y="385" text-anchor="middle" class="small">one Python file at a time</text>

  <rect class="box" x="390" y="90" width="250" height="90" fill="#fef3c7" stroke="#d97706"/>
  <text x="515" y="145" text-anchor="middle" class="label">cpg.nodes</text>
  <rect class="box" x="390" y="240" width="250" height="90" fill="#fef3c7" stroke="#d97706"/>
  <text x="515" y="295" text-anchor="middle" class="label">cpg.edges</text>
  <rect class="box" x="390" y="390" width="250" height="90" fill="#fef3c7" stroke="#d97706"/>
  <text x="515" y="445" text-anchor="middle" class="label">cpg.metadata</text>
  <rect class="box" x="390" y="540" width="250" height="90" fill="#fee2e2" stroke="#dc2626"/>
  <text x="515" y="595" text-anchor="middle" class="label">cpg.errors</text>

  <rect class="box" x="760" y="150" width="300" height="130" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="910" y="205" text-anchor="middle" class="label">Neo4j Kafka</text>
  <text x="910" y="240" text-anchor="middle" class="small">Connector Sink (2)</text>
  <rect class="box" x="1180" y="170" width="250" height="90" fill="#dcfce7" stroke="#16a34a"/>
  <text x="1305" y="225" text-anchor="middle" class="label">Neo4j</text>

  <rect class="box" x="760" y="390" width="300" height="130" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="910" y="445" text-anchor="middle" class="label">Spark Structured</text>
  <text x="910" y="480" text-anchor="middle" class="small">Streaming + checkpoint</text>
  <rect class="box" x="1180" y="410" width="250" height="90" fill="#dcfce7" stroke="#16a34a"/>
  <text x="1305" y="465" text-anchor="middle" class="label">MongoDB</text>

  <path class="arrow" d="M300 340 C340 300,350 135,390 135"/>
  <path class="arrow" d="M300 355 C345 335,350 285,390 285"/>
  <path class="arrow" d="M300 375 C345 395,350 435,390 435"/>
  <path class="arrow" d="M300 400 C345 455,350 585,390 585"/>
  <path class="arrow" d="M640 135 C700 135,700 190,760 190"/>
  <path class="arrow" d="M640 285 C700 285,700 240,760 240"/>
  <path class="arrow" d="M1060 215 L1180 215"/>
  <path class="arrow" d="M640 435 L760 435"/>
  <path class="arrow" d="M1060 455 L1180 455"/>
  <text x="760" y="115" class="small" fill="#166534">topology: direct, no Spark</text>
  <text x="675" y="610" class="small" fill="#991b1b">debug/monitoring only</text>
</svg>
